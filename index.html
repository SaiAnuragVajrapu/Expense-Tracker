<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Expense Tracker CRUD</title>

  <link rel="stylesheet" href="style.css">

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

</head>

<body>

<div class="container">

  <h1>Expense Tracker</h1>

  <div class="balance-container">
    <h4>Your Balance</h4>
    <h2 id="balance">₹0.00</h2>
  </div>

  <div class="income-expense-container">
    <div>
      <h4>Income</h4>
      <p id="money-plus" class="money plus">+₹0.00</p>
    </div>

    <div>
      <h4>Expense</h4>
      <p id="money-minus" class="money minus">-₹0.00</p>
    </div>
  </div>

  <h3>Transaction History</h3>

  <ul id="list" class="list"></ul>

  <h3>Add / Update Transaction</h3>

  <form id="form">

    <input type="hidden" id="transaction-id">

    <div class="form-control">
      <label>Transaction Name</label>
      <input type="text" id="text" placeholder="Enter transaction">
    </div>

    <div class="form-control">
      <label>Amount</label>
      <input type="number" id="amount" placeholder="Enter amount">
    </div>

    <button class="btn">Save Transaction</button>

  </form>

  <div class="export-buttons">

    <button class="pdf-btn" onclick="exportPDF()">
      Export PDF
    </button>

    <button class="excel-btn" onclick="exportExcel()">
      Export Excel
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
